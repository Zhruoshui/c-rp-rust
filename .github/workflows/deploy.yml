# Sample workflow for building and deploying a mdBook site to GitHub Pages
#
# To get started with mdBook see: https://rust-lang.github.io/mdBook/index.html
#
name: Deploy mdBook site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deployment at a time. New pushes supersede older docs builds.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.5.1
      # Bump this value when you want Actions to reinstall mdbook-tabs.
      MDBOOK_TABS_CACHE_VERSION: v1
    steps:
      - uses: actions/checkout@v4

      - name: Add Cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache mdBook tools
        id: cache-mdbook
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/mdbook
            ~/.cargo/bin/mdbook-tabs
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-mdbook-${{ env.MDBOOK_VERSION }}-tabs-${{ env.MDBOOK_TABS_CACHE_VERSION }}
          restore-keys: |
            ${{ runner.os }}-mdbook-${{ env.MDBOOK_VERSION }}-tabs-

      - name: Install mdBook tools
        run: |
          set -euo pipefail

          if ! command -v mdbook >/dev/null || ! mdbook --version | grep -Fq "mdbook v${MDBOOK_VERSION}"; then
            cargo install --locked --version "${MDBOOK_VERSION}" mdbook
          fi

          if ! command -v mdbook-tabs >/dev/null; then
            cargo install mdbook-tabs
          fi

          mdbook --version

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with mdBook
        run: mdbook build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./book

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
